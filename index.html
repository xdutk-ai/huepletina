<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alien Space Launcher & Chill</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="alien">
        <img id="alien-img" src="justaguy.png" alt="Пришелец">
    </div>

    <div class="controls">
        <button class="cloud-btn" onclick="changeCharacter('justaguy.png')">Just</button>
        <button class="cloud-btn" onclick="changeCharacter('dogguuy.png')">Dog</button>
        <button class="cloud-btn" onclick="changeCharacter('batmanguy.png')">Bat</button>
        <button class="cloud-btn" onclick="changeCharacter('spongeguy.png')">Sponge</button>
    </div>

    <div class="gravity-control">
        <label>Гравитация:</label>
        <input type="range" id="gravitySlider" min="0" max="2" step="0.1" value="0.8">
    </div>

    <script src="script.js"></script>
</body>
</html>
