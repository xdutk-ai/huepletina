<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alien Space Launcher & Chill</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="alien">
        <img id="alien-img" src="justaguy.png" alt="Пришелец">
    </div>

    <button id="menu-btn" class="menu-btn">⋮</button>

    <!-- Десктопные кнопки (только для ПК) -->
    <div class="controls" id="desktop-controls">
        <button class="cloud-btn" onclick="changeCharacter('justaguy.png')">Just</button>
        <button class="cloud-btn" onclick="changeCharacter('dogguuy.png')">Dog</button>
        <button class="cloud-btn" onclick="changeCharacter('batmanguy.png')">Bat</button>
        <button class="cloud-btn" onclick="changeCharacter('spongeguy.png')">Sponge</button>
    </div>

    <!-- Меню для всех (на телефоне — всё внутри) -->
    <div id="context-menu" class="context-menu">
        <button onclick="changeCharacter('justaguy.png')">Just Guy</button>
        <button onclick="changeCharacter('dogguuy.png')">Dog</button>
        <button onclick="changeCharacter('batmanguy.png')">Bat</button>
        <button onclick="changeCharacter('spongeguy.png')">Sponge</button>
        
        <hr>
        
        <!-- Слайдер гравитации внутри меню для телефонов -->
        <div class="menu-gravity">
            <label>Гравитация: <span id="gravityValue">0.8</span></label>
            <input type="range" id="gravitySlider" min="0" max="2" step="0.1" value="0.8">
        </div>
        
        <hr>
        <button onclick="spawnStick()">Заспавнить палку</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
